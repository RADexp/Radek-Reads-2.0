<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Radek Reads · Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0f0c20; }
  body { font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  /* Tweaks data-attrs */
  html[data-rr-stars="0"] .rr-stars { display: none !important; }
  html[data-rr-flags="0"] .rr-flag  { display: none !important; }
  /* Hide scrollbars on horizontal carousels */
  *::-webkit-scrollbar { height: 8px; width: 8px; }
  *::-webkit-scrollbar-thumb { background: rgba(120, 110, 200, .25); border-radius: 99px; }
  *::-webkit-scrollbar-track { background: transparent; }
  /* Fully hidden scrollbar (carousels that signal overflow via edge-fade + peek) */
  .rr-hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .rr-hide-scroll::-webkit-scrollbar { display: none; height: 0; width: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data (plain JS, no Babel) -->
<script src="data/books.js"></script>

<!-- Starter components -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Shared lib + intro + variant C -->
<script type="text/babel" src="variants/lib.jsx"></script>
<script type="text/babel" src="variants/intro.jsx"></script>
<script type="text/babel" src="variants/variant-c.jsx"></script>

<!-- App shell -->
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
