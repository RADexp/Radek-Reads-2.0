name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Typecheck (astro check) + testy jednostkowe czystych funkcji.
      # Nie budujemy tu strony — build odpytuje Notion na żywo i wymagałby
      # sekretu; Vercel i tak buduje przy każdym pushu.
      - run: npm run check
      - run: npm test
